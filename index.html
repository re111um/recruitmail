<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Featuring Recruit 메일 서식</title>
  <link rel="icon" href="/recruitmail/assets/favicon.ico?v=2" sizes="any">
  <link rel="icon" type="image/png" href="/recruitmail/assets/favicon-32.png?v=2" sizes="32x32">
  <link rel="apple-touch-icon" href="/recruitmail/assets/apple-touch-icon.png?v=2">

  <style>
    :root{
      --bg:#fafafa;
      --card:#ffffff;
      --ink:#111111;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#5E51FF;
      --accent-ink:#ffffff;
      --radius:16px;
      --control-h:44px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; padding:24px; background:var(--bg); color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,Helvetica,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
      line-height:1.5;
    }
    .container{
      max-width:1100px; margin:0 auto; background:var(--card);
      border:1px solid var(--line); border-radius:24px; padding:28px 28px 32px;
      box-shadow:0 10px 30px rgba(0,0,0,.03);
    }
    h1{margin:0 0 6px; font-size:32px; letter-spacing:-.02em}

    /* 1행: 기본 3열 */
    .grid{display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:14px}

    label{display:block; font-weight:600; margin:0 0 6px}
    .field input{
      width:100%; padding:14px 12px; border:1px solid var(--line); border-radius:12px;
      outline:none; background:#fff; font-size:15px; color:var(--ink);
    }
    .field input:focus{border-color:var(--accent); box-shadow:0 0 0 4px rgba(109,40,217,.12)}

    .field textarea{
  width:100%;
  padding:14px 12px;
  border:1px solid var(--line);
  border-radius:12px;
  outline:none;
  background:#fff;
  font-size:15px;
  color:var(--ink);
  resize:vertical;
  min-height:120px;
}
.field textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(109,40,217,.12);
}

    .btn-row{display:flex; gap:10px; flex-wrap:wrap; margin:16px 0 8px}
    .btn{appearance:none; border:1px solid var(--line); background:#fff; color:var(--ink);
      padding:12px 14px; border-radius:999px; cursor:pointer; font-weight:600; font-size:14px;
      transition:all .15s ease; box-shadow:0 2px 0 rgba(17,17,17,.04);
    }
    .btn:hover{transform:translateY(-1px); box-shadow:0 6px 14px rgba(17,17,17,.06)}
    .btn.primary{background:var(--accent); color:var(--accent-ink); border-color:transparent}
    .btn.black{background:#111111; color:#ffffff; border-color:#111111}
    .btn[disabled]{opacity:.55; cursor:not-allowed; transform:none; box-shadow:none}

    .actions{display:flex; gap:10px; align-items:center; margin:10px 0 8px}
    .hint{color:var(--muted); font-size:13px}

    .preview{
      margin-top:8px; padding:18px; border-radius:16px; background:#fff;
      border:2px dashed var(--line);
    }
    .preview h3{margin:0 0 10px; font-size:16px}
    .preview .frame{background:#fff; border:1px solid var(--line); border-radius:12px; padding:18px}

    /* 중앙 토스트 */
    .toast{
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-40%) scale(.98);
      background:#111; color:#fff; border-radius:12px;
      padding:14px 18px; opacity:0; transition:all .2s ease;
      text-align:center; z-index:9999; box-shadow:0 10px 30px rgba(0,0,0,.25);
      max-width:86vw;
      visibility:hidden;
      pointer-events:none;
    }
    .toast.show{opacity:1; transform:translate(-50%,-50%) scale(1)
               visibility:visible;}
    .toast .note{margin-top:8px; font-size:12px; color:#d1d5db; line-height:1.4}

    .hr{height:1px; background:var(--line); margin:18px 0}

    /* 날짜 입력 2열 */
    .grid.dates{
      display:grid; grid-template-columns:1fr 1fr; gap:18px;
      align-items:start; margin:8px 0 0px;
    }
    .datebox{display:block; border:1px solid var(--line); border-radius:12px; padding:10px; background:#fff;}
    .date-row{display:flex; align-items:center; gap:6px; padding:6px 8px; border-radius:8px;}
    .date-row + .date-row{margin-top:8px; background:#fafafa;}
    .date-row input, .date-row select{
      border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:14px;
    }
    .date-row input:focus, .date-row select:focus{
      outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(109,40,217,.12);
    }
    .date-row .y{width:86px; text-align:center;}
    .date-row .m,.date-row .d{width:56px; text-align:center;}
    .date-row .h,.date-row .i{width:56px; text-align:center;}
    .date-row .w{min-width:84px;}
    .date-row .sep,.date-row .colon{color:#6b7280;}

    @media (max-width:900px){
      .grid.dates{grid-template-columns:1fr;}
    }


.dates-after{
  display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:14px;
}
.dates-after .intern-field{
  grid-column:2; display:flex; align-items:center; gap:8px;
}
.dates-after .intern-field .intern-label{
  display:inline-flex; align-items:center;
  margin:0; font-weight:600;
}
#isIntern{ width:13px; height:13px; }


@media (max-width:900px){
  .dates-after{ grid-template-columns:1fr; }
  .dates-after .intern-field{ grid-column:1; }
}

    /* ================================================= */
/* ▼▼▼ '인턴십' 체크박스 레이아웃 조정을 위해 이 코드를 추가 ▼▼▼ */
/* ================================================= */

/* '인턴십' 라벨과 체크박스를 감싸는 컨테이너 스타일 */
.intern-inline {
  display: flex; /* 자식 요소(라벨, 체크박스)를 가로로 배치합니다. */
  align-items: center; /* 세로 방향으로 중앙에 정렬합니다. */
  gap: 8px; /* 라벨과 체크박스 사이에 8px의 간격을 줍니다. */
}

/* '인턴십' 라벨에만 적용될 스타일 (기존의 block 속성 덮어쓰기) */
.intern-inline .intern-label {
  display: inline-block; /* 라벨이 한 줄을 다 차지하지 않도록 변경합니다. */
  margin: 0; /* 라벨 아래쪽의 기존 여백을 제거합니다. */
}
   /* =================== 히스토리 기능 CSS 추가 =================== */
.main-wrapper {
  display: flex;
  gap: 24px;
  max-width: 1500px;
  margin: 0 auto;
  align-items: flex-start;
}
.container {
  flex: 1; /* 남는 공간을 모두 차지 */
  min-width: 0;
}
.history-panel {
  width: 320px;
  flex-shrink: 0;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,.03);
  position: sticky; /* 스크롤してもついてくるように */
  top: 24px;
}
.history-panel h2 {
  margin: 0 0 16px;
  font-size: 18px;
}
.history-panel ul {
  list-style: none;
  margin: 0;
  padding: 0;
  max-height: 70vh;
  overflow-y: auto;
}
.history-panel li {
  margin: 0;
  padding: 0;
}
.history-panel .history-item {
  display: block;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  border-bottom: 1px solid var(--line);
  transition: background .15s ease;
}
.history-panel .history-item:hover {
  background: #f3f4f6;
}
.history-panel .history-item strong {
  font-weight: 600;
  color: var(--ink);
  display: block;
}
.history-panel .history-item .meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}
.history-panel .history-item .meta .key {
  font-weight: 600;
}

@media (max-width: 1200px) {
  .main-wrapper {
    flex-direction: column;
  }
  .history-panel {
    width: 100%;
    position: static;
  }
} 
  /* ▼▼▼ [추가] 자동화 버튼 스타일 ▼▼▼ */
    .schedule-button { 
      display: inline-block; 
      background-color: #5E51FF; 
      color: #ffffff; 
      padding: 12px 20px; 
      margin: 16px 0; 
      font-size: 16px; 
      font-weight: bold; 
      text-decoration: none; 
      border-radius: 8px; 
      text-align: center; 
    }

    /* 과제 선택 옆 초기화 버튼 */
.select-with-reset{
  display:flex;
  gap:10px;
  align-items:center;
}
.select-with-reset select{
  flex:1;
  min-width:0;
}

.icon-btn{
  width:var(--control-h);
  height:var(--control-h);
  border:1px solid var(--line);
  background:#fff;
  border-radius:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 2px 0 rgba(17,17,17,.04);
  transition:all .15s ease;
}
.icon-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 14px rgba(17,17,17,.06);
}
.icon-btn img{
  width:18px;
  height:18px;
  opacity:.9;
}
/* 기존 6개 필드 영역을 대체하는 날짜 그룹 컨테이너 */
.date-picker-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.date-picker-input {
  flex: 1;
  min-width: 0;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 12px;
  outline: none;
  background: #fff;
  font-size: 14px;
  color: var(--ink);
  height: var(--control-h);
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.date-picker-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(94, 81, 255, 0.12);
}


.time-picker-select {
  width: 90px;
  flex-shrink: 0;
  padding: 10px 8px;
  border: 1px solid var(--line);
  border-radius: 12px;
  outline: none;
  background: #fff;
  font-size: 14px;
  color: var(--ink);
  height: var(--control-h);
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.time-picker-select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(94, 81, 255, 0.12);
}

.weekday-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 38px;
  height: 28px;
  padding: 0 8px;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  border-radius: 8px;
  background: transparent;
  transition: all 0.2s;
}

.weekday-badge.active {
  background: rgba(94, 81, 255, 0.1);
  color: var(--accent);
}

/* 날짜 그룹 라벨 개선 */
.date-group {
  margin-bottom: 12px;
}

.date-group-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 6px;
  color: var(--ink);
}

.date-group-label .date-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  background: var(--accent);
  color: #fff;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 800;
}

/* ============================================================
   [기능 2] 파이프라인 트래커 스타일
   ============================================================ */

/* 기존 history-panel을 파이프라인 패널로 진화 */
.history-panel h2 {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.pipeline-clear-btn {
  font-size: 11px;
  color: var(--muted);
  background: none;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 3px 8px;
  cursor: pointer;
  transition: all 0.15s;
}

.pipeline-clear-btn:hover {
  background: #fee2e2;
  border-color: #fca5a5;
  color: #b91c1c;
}

.pipeline-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
}

.pipeline-item {
  display: block;
  padding: 14px 12px;
  border-radius: 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--line);
  transition: background 0.15s ease, transform 0.1s ease;
}

.pipeline-item:hover {
  background: #f3f4f6;
  transform: translateX(2px);
}

.pipeline-item:active {
  transform: translateX(0);
}

.pipeline-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.pipeline-header strong {
  font-weight: 700;
  font-size: 14px;
  color: var(--ink);
}

.pipeline-position {
  font-size: 11px;
  color: #fff;
  background: var(--accent);
  padding: 1px 8px;
  border-radius: 999px;
  font-weight: 600;
}

.reject-badge {
  font-size: 11px;
  color: #fff;
  background: #ef4444;
  padding: 1px 8px;
  border-radius: 999px;
  font-weight: 600;
}

/* 파이프라인 도트 (진행 상태 표시) */
.pipeline-dots {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 6px;
}

.pipeline-dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  background: #e5e7eb;
  transition: all 0.2s;
  position: relative;
}

.pipeline-dot.completed {
  transform: scale(1);
}

.pipeline-dot.current {
  transform: scale(1.3);
  box-shadow: 0 0 0 3px rgba(94, 81, 255, 0.2);
}

/* 도트 사이 연결선 */
.pipeline-dots {
  position: relative;
}

.pipeline-dot + .pipeline-dot::before {
  content: '';
  position: absolute;
  left: -6px;
  top: 50%;
  width: 6px;
  height: 2px;
  background: #e5e7eb;
  transform: translateY(-50%);
}

.pipeline-dot.completed + .pipeline-dot::before,
.pipeline-dot + .pipeline-dot.completed::before {
  background: var(--accent);
}

.pipeline-last {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
}

.pipeline-time {
  color: #9ca3af;
}

.next-stage-hint {
  font-size: 11px;
  color: var(--accent);
  margin-top: 4px;
  padding: 3px 8px;
  background: rgba(94, 81, 255, 0.06);
  border-radius: 6px;
  display: inline-block;
}

/* 다음 추천 단계 버튼 하이라이트 */
.btn.next-recommended {
  position: relative;
  box-shadow: 0 0 0 2px var(--accent), 0 4px 12px rgba(94, 81, 255, 0.25);
  animation: pulse-recommend 2s ease-in-out infinite;
}

.btn.next-recommended::after {
  content: '추천';
  position: absolute;
  top: -8px;
  right: -4px;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  background: var(--accent);
  padding: 1px 5px;
  border-radius: 4px;
  line-height: 1.3;
}

@keyframes pulse-recommend {
  0%, 100% { box-shadow: 0 0 0 2px var(--accent), 0 4px 12px rgba(94, 81, 255, 0.25); }
  50% { box-shadow: 0 0 0 3px var(--accent), 0 4px 16px rgba(94, 81, 255, 0.35); }
}

.btn.next-secondary {
  opacity: 0.7;
}

/* ============================================================
   [기능 3] 오퍼레터 모달 스타일
   ============================================================ */

.offer-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(4px);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.offer-modal-overlay.open {
  display: flex;
}

.offer-modal {
  background: #fff;
  border-radius: 20px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  animation: modal-slide-up 0.3s ease;
}

@keyframes modal-slide-up {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.offer-modal-header {
  padding: 24px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.offer-modal-header h2 {
  margin: 0;
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
}

.offer-modal-close {
  width: 36px;
  height: 36px;
  border: none;
  background: #f3f4f6;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--muted);
  transition: all 0.15s;
}

.offer-modal-close:hover {
  background: #e5e7eb;
  color: var(--ink);
}

.offer-modal-body {
  padding: 20px 24px;
}

.offer-field {
  margin-bottom: 18px;
}

.offer-field label {
  display: block;
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 6px;
  color: var(--ink);
}

.offer-field .hint-text {
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
  margin-left: 4px;
}

.offer-field input,
.offer-field textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--line);
  border-radius: 12px;
  outline: none;
  background: #fff;
  font-size: 14px;
  color: var(--ink);
  font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.offer-field input:focus,
.offer-field textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(94, 81, 255, 0.12);
}

.offer-field textarea {
  min-height: 120px;
  resize: vertical;
  line-height: 1.6;
}

.offer-field .salary-input-wrapper {
  position: relative;
}

.offer-field .salary-input-wrapper input {
  padding-right: 40px;
}

.offer-field .salary-unit {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  color: var(--muted);
  font-weight: 600;
  pointer-events: none;
}

.offer-modal-footer {
  padding: 0 24px 24px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.offer-modal-footer .btn {
  min-width: 100px;
}

/* ============================================================
   [기능 4] GAS 동기화 스타일
   ============================================================ */

.sync-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 14px;
  padding: 12px 14px;
  background: #fafafa;
  border: 1px dashed var(--line);
  border-radius: 12px;
}

.sync-row input[type="email"] {
  flex: 1;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 10px;
  outline: none;
  background: #fff;
  font-size: 14px;
  color: var(--ink);
}

.sync-row input[type="email"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(94, 81, 255, 0.1);
}

.sync-btn {
  padding: 10px 16px;
  background: #111;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}

.sync-btn:hover {
  background: #333;
  transform: translateY(-1px);
}

.sync-btn:disabled {
  background: #9ca3af;
  cursor: not-allowed;
  transform: none;
}

#syncStatus {
  font-size: 12px;
  line-height: 1.5;
  margin-top: 6px;
}

.sync-found {
  color: #059669;
  background: #ecfdf5;
  padding: 6px 10px;
  border-radius: 8px;
  display: inline-block;
}

.sync-not-found {
  color: #d97706;
  background: #fffbeb;
  padding: 6px 10px;
  border-radius: 8px;
  display: inline-block;
}

.sync-error {
  color: #dc2626;
  background: #fef2f2;
  padding: 6px 10px;
  border-radius: 8px;
  display: inline-block;
}

/* ============================================================
   [개선] 반응형 날짜 영역 재배치
   ============================================================ */

.dates-grid-v2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  margin: 14px 0;
}

.dates-grid-v2 .date-group {
  min-width: 0;
}

.dates-grid-v2 .date-group.confirm-date {
  padding-top: 10px;
  /* grid-column: 1 / -1 없음 → 1열 크기 */

  // ▼▼▼ [추가] FE 마감일 계산 함수 (확정일 + 2일) ▼▼▼
  function getFeDeadline(dateStr) {
    if(!dateStr) return '<span style="color:#6b7280;">{날짜를 입력하세요}</span>';
    
    // "YYYY-MM-DD" 형식을 추출
    const match = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(!match) return dateStr; // 포맷이 안 맞으면 원본 반환

    const y = parseInt(match[1], 10);
    const m = parseInt(match[2], 10) - 1; // JS 월은 0부터 시작
    const d = parseInt(match[3], 10);

    const date = new Date(y, m, d);
    date.setDate(date.getDate() + 2); // 2일 더하기

    const weekNames = ["일", "월", "화", "수", "목", "금", "토"];
    const ny = date.getFullYear();
    const nm = pad2(date.getMonth() + 1);

            : ('rid_' + Date.now() + '_' + Math.random().toString(16).slice(2));

  // 3. 파라미터 생성 (GitHub가 읽을 수 있도록)
  const params = new URLSearchParams({
    name: vars.name,
    position: vars.position,
    stage: templateKeys[key] || key,
    dates: vars.proposeDates.join(','),
    rid: rid, 
    v: new Date().getTime() // 캐시 방지용
  });

  // 4. GitHub 주소로 연결
  return `${WEB_APP_URL}?${params.toString()}`;
}

  /* =================== 히스토리 기능 스크립트 (최종 수정판) =================== */
  const HISTORY_KEY = 'featuringRecruitHistory'; // 브라우저의 '영구 기억 저장소'에 사용할 이름표
  const MAX_HISTORY = 10; // 최대 10개까지 저장

  // '서식 복사' 버튼을 누르면 실행될 함수
  function saveHistory() {
    const vars = buildVars();
    // 지원자 이름이 없으면 저장하지 않음
    if (!vars.name || vars.name === '지원자') return;

    // 1. 현재 시간 기록하기 (타임스탬프)
    const now = new Date();
    const timestamp = `${now.getFullYear()}-${pad2(now.getMonth() + 1)}-${pad2(now.getDate())} ${pad2(now.getHours())}:${pad2(now.getMinutes())}`;

    // 2. 저장할 내용(이름, 포지션, 서식 종류, 시간)을 하나의 묶음으로 만들기
    const historyItem = {
      name: vars.name,
      position: vars.position,
      key: currentKey, // 아까 기억해둔 현재 서식 종류 (예: 'interview1')
      timestamp: timestamp,
    };

    // 3. 기존에 저장된 히스토리 목록을 불러오기
    let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    
    // 4. 새로운 내역을 맨 앞에 추가하기 (최신순 정렬)
    history.unshift(historyItem);
    
    // 5. 만약 10개가 넘어가면 가장 오래된 내역 삭제하기
    if (history.length > MAX_HISTORY) {
      history = history.slice(0, MAX_HISTORY);
    }
    
    // 6. 최종 목록을 브라우저의 '영구 기억 저장소'에 다시 저장하기
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    
    // 7. 화면에 히스토리 목록 새로고침하기
    loadHistory();
  }

  // 페이지가 열릴 때, 그리고 히스토리가 추가될 때 실행될 함수
  function loadHistory() {
    if (!historyListEl) return;
    let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    if (history.length === 0) {
      historyListEl.innerHTML = '<li class="history-item"><div class="meta">내역이 없습니다.</div></li>';
      return;
    }
    // 저장된 목록을 화면에 예쁘게 표시하기
    historyListEl.innerHTML = history.map(item => `
      <li>
        <a class="history-item" data-name="${escapeHtml(item.name)}" data-position="${escapeHtml(item.position)}">
          <strong>${escapeHtml(item.name)} / ${escapeHtml(item.position)}</strong>
          <div class="meta">
            ${item.timestamp} / <span class="key">[${templateKeys[item.key] || item.key}]</span>
          </div>
        </a>
      </li>
    `).join('');
  }

  // 히스토리 목록의 항목을 클릭했을 때 실행될 함수
  function recallHistoryItem(target) {
    const name = target.dataset.name;
    const position = target.dataset.position;
    if (name) nameEl.value = name;
    if (position) positionEl.value = position;
    showToast(`${name}님의 정보를 불러왔습니다.`);
  }

  /* 바인딩 (이벤트 연결) */
  document.querySelectorAll('.js-template').forEach(btn=>{ btn.addEventListener('click', ()=> renderTemplateByKey(btn.dataset.key)); });
  copyBtn.addEventListener('click', copyHtml);
  copySubjectBtn.addEventListener('click', copySubject);
  if(resetBtn) resetBtn.addEventListener('click', resetAllFields);
    
  if(historyListEl) {
    historyListEl.addEventListener('click', (e) => {
      const item = e.target.closest('.history-item');
      if (item) {
        recallHistoryItem(item);
      }
    });
  }

    

  // 페이지가 처음 열릴 때 히스토리를 한번 불러옵니다.
  loadHistory();
  </script>

<script>
const WEEKDAY_MAP = ['일', '월', '화', '수', '목', '금', '토'];

// 시간 슬롯 생성 (09:00 ~ 21:00, 30분 단위)
const TIME_SLOTS = [];
for (let h = 9; h <= 21; h++) {
  TIME_SLOTS.push(`${String(h).padStart(2, '0')}:00`);
  if (h < 21) TIME_SLOTS.push(`${String(h).padStart(2, '0')}:30`);
}

/**
 * 날짜 피커 초기화 — 기존 6개 필드를 새 UI로 교체
 * 
 * @param {string} prefix - 날짜 필드 접두사 ('p1', 'p2', 'p3', 'c1')
 */
function initDatePicker(prefix) {
  const container = document.getElementById(`dateGroup_${prefix}`);
  if (!container) return;

  // 기존 라벨을 보존하고, 피커만 추가
  const existingLabel = container.querySelector('.date-group-label');
  const labelHtml = existingLabel ? existingLabel.outerHTML : '';

  container.innerHTML = labelHtml + `
    <div class="date-picker-row">
      <input type="date" id="${prefix}_date" class="date-picker-input" 
             onchange="onDatePickerChange('${prefix}')" />
      <select id="${prefix}_time" class="time-picker-select" onchange="onDatePickerChange('${prefix}')">
        <option value="">시간</option>
        ${TIME_SLOTS.map(t => `<option value="${t}">${t}</option>`).join('')}
      </select>
      <span id="${prefix}_weekday" class="weekday-badge"></span>
    </div>
  `;
}

/**
 * 날짜 선택 시 요일 자동 계산 + 기존 hidden 필드 동기화
 */
function onDatePickerChange(prefix) {
  const dateInput = document.getElementById(`${prefix}_date`);
  const timeSelect = document.getElementById(`${prefix}_time`);
  const weekdayBadge = document.getElementById(`${prefix}_weekday`);

  if (dateInput && dateInput.value) {
    const d = new Date(dateInput.value + 'T00:00:00');
    const dayName = WEEKDAY_MAP[d.getDay()];
    weekdayBadge.textContent = `(${dayName})`;
    weekdayBadge.classList.add('active');
  } else {
    weekdayBadge.textContent = '';
    weekdayBadge.classList.remove('active');
  }

  // 미리보기가 열려있으면 자동으로 갱신
  if (currentKey) {
    renderTemplateByKey(currentKey);
  }
}

/**
 * 기존 readDate() 함수를 대체하는 새 버전
 * 출력 포맷: "YYYY-MM-DD (요일) HH:MM" — 기존과 100% 동일
 */
function readDateV2(prefix) {
  const dateInput = document.getElementById(`${prefix}_date`);
  const timeSelect = document.getElementById(`${prefix}_time`);

  if (!dateInput || !dateInput.value) return '';
  if (!timeSelect || !timeSelect.value) return '';

  const d = new Date(dateInput.value + 'T00:00:00');
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const w = WEEKDAY_MAP[d.getDay()];
  const time = timeSelect.value;

  return `${y}-${m}-${day} (${w}) ${time}`;
}

/**
 * 기존 buildVars()의 날짜 부분을 새 피커로 대체
 * 
 * 통합 방법: 기존 buildVars() 내에서 readDate → readDateV2로 교체
 */
function buildVarsV2() {
  const normalizedUrl = (document.getElementById('taskurlSelect')?.value || '').trim();
  const propose = [readDateV2('p1'), readDateV2('p2'), readDateV2('p3')].filter(Boolean);
  const confirm = readDateV2('c1');

  return {
    name: (nameEl.value || '').trim() || '지원자',
    position: (positionEl.value || '').trim() || '포지션',
    taskurl: normalizedUrl,
    taskTopic: getTaskTopicByUrl(normalizedUrl),
    taskType: getTaskTypeByUrl(normalizedUrl),
    proposeDates: propose,
    confirmDate: confirm,
    isIntern: !!(isInternEl && isInternEl.checked)
  };
}

/**
 * 모든 날짜 피커 초기화 실행
 */
function initAllDatePickers() {
  ['p1', 'p2', 'p3', 'c1'].forEach(prefix => {
    initDatePicker(prefix);
  });
}

/**
 * 날짜 피커 초기화 (리셋 기능 확장)
 */
function resetDatePickers() {
  ['p1', 'p2', 'p3', 'c1'].forEach(prefix => {
    const dateInput = document.getElementById(`${prefix}_date`);
    const timeSelect = document.getElementById(`${prefix}_time`);
    const weekdayBadge = document.getElementById(`${prefix}_weekday`);
    if (dateInput) dateInput.value = '';
    if (timeSelect) timeSelect.value = '';
    if (weekdayBadge) { weekdayBadge.textContent = ''; weekdayBadge.classList.remove('active'); }
  });
}

/**

 * 
 * 데이터 구조:
 * {
 *   "홍길동|BE Developer": {
 *     name: "홍길동",
 *     position: "BE Developer",
 *     stages: [
 *       { key: "assignment_schedule", timestamp: "2025-06-10 14:30" },
 *       { key: "task", timestamp: "2025-06-12 09:00" },
 *       { key: "interview1", timestamp: "2025-06-15 11:00" }
 *     ]
 *   }
 * }
 */

const PIPELINE_KEY = 'featuringRecruitPipeline';

const PIPELINE_STAGES = [
  { key: 'assignment_schedule', label: '과제 일정',       color: '#818cf8', icon: '📋' },
  { key: 'task',                label: '과제전형',         color: '#6366f1', icon: '📝' },
  { key: 'interview1',         label: '1차 인터뷰',       color: '#5E51FF', icon: '🗣️' },
  { key: 'interviewFinal',     label: '최종 인터뷰',      color: '#4f46e5', icon: '👔' },
  { key: 'reference',          label: '레퍼런스 체크',    color: '#3730a3', icon: '🔍' },
  { key: 'finalNotice',        label: '처우협의 및 오퍼레터', color: '#312e81', icon: '💼' },
  { key: 'onboarding',         label: '입사 안내',        color: '#1e1b4b', icon: '🎉' },
  { key: 'reject',             label: '불합격',           color: '#ef4444', icon: '❌' }
];

function getStageIndex(key) {
  return PIPELINE_STAGES.findIndex(s => s.key === key);
}

function getStageInfo(key) {
  return PIPELINE_STAGES.find(s => s.key === key) || { label: key, color: '#9ca3af', icon: '❓' };
}

/**
 * 파이프라인 데이터 로드
 */
function loadPipeline() {
  try {
    return JSON.parse(localStorage.getItem(PIPELINE_KEY) || '{}');
  } catch {
    return {};
  }
}

function saveToPipeline(name, position, key) {
  if (!name || name === '지원자') return;
  var emailInput = document.getElementById('candidateEmail');
  var email = (emailInput && emailInput.value) ? emailInput.value.trim() : '';

  const pipeline = loadPipeline();
  const candidateKey = `${name}|${position}`;

  if (!pipeline[candidateKey]) {
    pipeline[candidateKey] = {
      name: name,
      position: position,
      email: email,
      stages: []
    };
  }

  const now = new Date();
  const timestamp = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

  // 같은 단계가 이미 있으면 타임스탬프 업데이트
  const existingIdx = pipeline[candidateKey].stages.findIndex(s => s.key === key);
  if (existingIdx >= 0) {
    pipeline[candidateKey].stages[existingIdx].timestamp = timestamp;
  } else {
    pipeline[candidateKey].stages.push({ key, timestamp });
  }

  // 최신 활동 시간 기록
  pipeline[candidateKey].lastActivity = timestamp;

  localStorage.setItem(PIPELINE_KEY, JSON.stringify(pipeline));
  renderPipelinePanel();
}

/**
 * 다음 추천 단계 계산
 */
function getNextStage(stages) {
  if (!stages || stages.length === 0) return PIPELINE_STAGES[0];

  // 불합격이 있으면 추천 없음
  if (stages.some(s => s.key === 'reject')) return null;

  // 가장 마지막 단계의 인덱스를 찾고, 그 다음 단계 추천
  let maxIdx = -1;
  stages.forEach(s => {
    const idx = getStageIndex(s.key);
    if (idx > maxIdx) maxIdx = idx;
  });

  // reject를 제외한 다음 단계
  const nextIdx = maxIdx + 1;
  if (nextIdx >= PIPELINE_STAGES.length - 1) return null; // onboarding 이후 없음
  return PIPELINE_STAGES[nextIdx];
}

/**
 * 파이프라인 패널 렌더링
 */
function renderPipelinePanel() {
  const panel = document.getElementById('pipelineList');
  if (!panel) return;

  const pipeline = loadPipeline();
  const entries = Object.entries(pipeline);

  if (entries.length === 0) {
    panel.innerHTML = '<li class="pipeline-empty">아직 발송 이력이 없습니다.</li>';
    return;
  }

  // 최신 활동 순 정렬
  entries.sort((a, b) => (b[1].lastActivity || '').localeCompare(a[1].lastActivity || ''));

  panel.innerHTML = entries.map(([candidateKey, data]) => {
    const nextStage = getNextStage(data.stages);
    const isRejected = data.stages.some(s => s.key === 'reject');

    // 파이프라인 도트 생성
    const dotsHtml = PIPELINE_STAGES.filter(s => s.key !== 'reject').map(stage => {
      const completed = data.stages.find(s => s.key === stage.key);
      const isCurrent = completed && !data.stages.find(s => getStageIndex(s.key) > getStageIndex(stage.key) && s.key !== 'reject');
      return `<span class="pipeline-dot ${completed ? 'completed' : ''} ${isCurrent ? 'current' : ''}" 
                    style="${completed ? `background:${stage.color}` : ''}"
                    title="${stage.label}${completed ? ' (' + completed.timestamp + ')' : ''}"></span>`;
    }).join('');

    // 불합격 표시
    const rejectBadge = isRejected ? '<span class="reject-badge">불합격</span>' : '';

    // 다음 추천 단계
    const nextHtml = nextStage && !isRejected
      ? `<div class="next-stage-hint">다음 추천: <strong>${nextStage.icon} ${nextStage.label}</strong></div>`
      : '';

    // 마지막 단계 정보
    const lastStage = data.stages.length > 0
      ? data.stages.reduce((a, b) => (a.timestamp > b.timestamp ? a : b))
      : null;
    const lastInfo = lastStage ? getStageInfo(lastStage.key) : null;

    return `
      <li>
        <div class="pipeline-item" onclick="loadCandidateFromPipeline('${candidateKey.replace(/'/g, "\\'")}')">
          <div class="pipeline-header">
            <strong>${escapeHtml(data.name)}</strong> ${rejectBadge}
            <span class="pipeline-position">${escapeHtml(data.position)}</span>
          </div>
          <div class="pipeline-dots">${dotsHtml}</div>
          ${lastInfo ? `<div class="pipeline-last">최근: ${lastInfo.icon} ${lastInfo.label} <span class="pipeline-time">${lastStage.timestamp}</span></div>` : ''}
          ${nextHtml}
        </div>
      </li>`;
  }).join('');
}

/**
 * 파이프라인에서 후보자 클릭 시 → 입력 필드 자동 채우기 + 다음 단계 하이라이트
 */
function loadCandidateFromPipeline(candidateKey) {
  const pipeline = loadPipeline();
  const data = pipeline[candidateKey];
  if (!data) return;

  // 입력 필드 채우기
  if (nameEl) nameEl.value = data.name;
  if (positionEl) positionEl.value = data.position;
  var emailInput = document.getElementById('candidateEmail');
  if (emailInput && data.email) emailInput.value = data.email;

  // 다음 추천 단계 하이라이트
  highlightNextStage(data.stages);

  showToast(`${data.name}님 정보를 불러왔습니다.`);
}

/**
 * 다음 추천 단계 버튼 하이라이트
 */
function highlightNextStage(stages) {
  // 기존 하이라이트 제거
  document.querySelectorAll('.js-template').forEach(btn => {
    btn.classList.remove('next-recommended');
  });

  const nextStage = getNextStage(stages);
  if (!nextStage) return;

  // 해당 버튼 하이라이트
  const btn = document.querySelector(`.js-template[data-key="${nextStage.key}"]`);
  if (btn) {
    btn.classList.add('next-recommended');
  }

  // 불합격 버튼은 항상 보조 하이라이트
  const rejectBtn = document.querySelector('.js-template[data-key="reject"]');
  if (rejectBtn && nextStage.key !== 'reject') {
    rejectBtn.classList.add('next-secondary');
  }
}

/**
 * 파이프라인 데이터 전체 초기화
 */
function clearPipeline() {
  if (confirm('모든 후보자 파이프라인 데이터를 삭제하시겠습니까?')) {
    localStorage.removeItem(PIPELINE_KEY);
    renderPipelinePanel();
    showToast('파이프라인이 초기화되었습니다.');
  }
}

/**
 * GAS WebApp에 후보자 이메일로 현재 상태를 조회합니다.
 * 
 * 사용 전제: ks_gs.txt의 GAS 프로젝트에 아래 doGet 핸들러가 추가되어야 합니다.
 * (별도 파일 gas-sync-endpoint.gs 참고)
 */

// GAS WebApp URL (기존 WEB_APP_URL과 동일하거나 별도 배포)
// const GAS_SYNC_URL = WEB_APP_URL; // 기존 변수 재활용 가능

  var syncedInterviewerNames = [];  // 시트 조회 후 면접관 이름 저장
  var pendingCandidatesCache = [];  // ★ 추가: 미확정 후보자 캐시
  
/**
 * 후보자 상태 조회
 * @param {string} email - 후보자 이메일
 * @returns {Promise<Object>} - { found, stage, dates, confirmed, position }
 */
async function fetchCandidateStatus(email) {
  if (!email || !email.includes('@')) return null;

  var syncUrl = (typeof GAS_SYNC_URL !== 'undefined' && GAS_SYNC_URL) ? GAS_SYNC_URL : '';
  if (!syncUrl) {
    console.warn('[GAS Sync] GAS_SYNC_URL이 설정되지 않았습니다.');
    return null;
  }

  try {
    var res = await fetch(syncUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'status', email: email }),
      redirect: 'follow'
    });
    var data = await res.json();
    return data;
  } catch (err) {
    console.error('[GAS Sync Error]', err);
    return null;
  }
}

async function syncCandidateStatus() {
  var emailInput = document.getElementById('candidateEmail');
  var syncBtn = document.getElementById('syncBtn');
  var syncStatus = document.getElementById('syncStatus');

  if (!emailInput || !emailInput.value) {
    if (syncStatus) syncStatus.innerHTML = '<span class="sync-error">이메일을 입력해주세요.</span>';
    return;
  }

  if (syncBtn) {
    syncBtn.disabled = true;
    syncBtn.textContent = '조회중...';
  }

    // 면접관 정보 초기화
  syncedInterviewerNames = [];

  try {
    var data = await fetchCandidateStatus(emailInput.value.trim());

    if (!data || !data.found) {
      if (syncStatus) {
        syncStatus.innerHTML = '<span class="sync-not-found">' +
          (data && data.message ? data.message : '해당 이메일의 후보자를 찾을 수 없습니다.') +
          '</span>';
      }
      return;
    }

    // 필드 자동 채우기
    if (data.name && nameEl) nameEl.value = data.name;
    if (data.position && positionEl) positionEl.value = data.position;

    // 확정 일정 자동 입력
    if (data.confirmed && typeof autoFillDateFromString === 'function') {
      autoFillDateFromString(data.confirmed, 'c1');
    }

    // ★ 면접관 이름 저장
    if (data.interviewerNames && data.interviewerNames.length > 0) {
      syncedInterviewerNames = data.interviewerNames;
    }

    // 상태 표시
    if (syncStatus) {
      var stageInfo = (typeof getStageInfo === 'function')
        ? getStageInfo(data.stage || '')
        : { icon: '📋', label: data.stage || '알 수 없음' };

      var interviewerText = syncedInterviewerNames.length > 0
        ? ' | 면접관: ' + syncedInterviewerNames.join(', ')
        : '';

      syncStatus.innerHTML =
        '<span class="sync-found">' +
          '✅ ' + escapeHtml(data.name) + ' | ' + escapeHtml(data.position) +
          ' | 현재 단계: <strong>' + stageInfo.icon + ' ' + stageInfo.label + '</strong>' +
          (data.confirmed ? ' | 확정일: ' + escapeHtml(data.confirmed) : '') +
          interviewerText +
        '</span>';
    }

    if (typeof showToast === 'function') {
      showToast(data.name + '님의 정보를 시트에서 불러왔습니다.');
    }

  } catch (err) {
    if (syncStatus) {
      syncStatus.innerHTML = '<span class="sync-error">조회 중 오류가 발생했습니다.</span>';
    }
  } finally {
    if (syncBtn) {
      syncBtn.disabled = false;
      syncBtn.textContent = '시트 조회';
    }
  }
}

/**
 * "YYYY-MM-DD (요일) HH:MM" 형식의 문자열을 날짜 피커에 자동 입력
 */
function autoFillDateFromString(dateStr, prefix) {
  if (!dateStr) return;
  
  // "2025-06-15 (일) 14:00" 형태 파싱
  const match = dateStr.match(/^(\d{4}-\d{2}-\d{2})\s*\([^)]*\)\s*(\d{2}:\d{2})$/);
  if (!match) return;

  const dateInput = document.getElementById(`${prefix}_date`);
  const timeSelect = document.getElementById(`${prefix}_time`);

  if (dateInput) dateInput.value = match[1];
  if (timeSelect) timeSelect.value = match[2];

  onDatePickerChange(prefix);
}

async function sendEmailDirect() {
  if (!currentHtml || !currentSubject) {
    alert('먼저 서식을 선택해주세요.');
    return;
  }

  // 수신자 이메일
  var candidateEmailEl = document.getElementById('candidateEmail');
  var recipientEmail = (candidateEmailEl && candidateEmailEl.value) ? candidateEmailEl.value.trim() : '';

  if (!recipientEmail || recipientEmail.indexOf('@') === -1) {
    recipientEmail = prompt('수신자 이메일을 입력해주세요:', '');
    if (!recipientEmail || recipientEmail.indexOf('@') === -1) {
      alert('유효한 이메일 주소를 입력해주세요.');
      return;
    }
  }

  // 발송 전 확인
  if (!confirm(
    '아래 내용으로 발송하시겠습니까?\n\n' +
    '발신: recruit@featuring.in\n' +
    '수신: ' + recipientEmail + '\n' +
    '제목: ' + currentSubject + '\n\n' +
    '※ 발송 후 취소할 수 없습니다.'
  )) return;

  var sendBtn = document.getElementById('sendBtn');
  if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = '발송 중...'; }

  try {
    var syncUrl = (typeof GAS_SYNC_URL !== 'undefined' && GAS_SYNC_URL) ? GAS_SYNC_URL : '';
    if (!syncUrl) { alert('GAS_SYNC_URL이 설정되지 않았습니다.'); return; }

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000); // 15초 타임아웃

    var res = await fetch(syncUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'sendEmail',
        to: recipientEmail,
        subject: currentSubject,
        htmlBody: currentHtml
      }),
      redirect: 'follow',
      signal: controller.signal
    });
    clearTimeout(timeoutId);

    var data;
    try {
      data = await res.json();
    } catch (e) {
      // 응답은 왔지만 JSON 파싱 실패 → 발송은 됐을 가능성 높음
      if (typeof showToast === 'function') showToast('발송되었을 수 있습니다. 받은편지함을 확인해주세요.');
      return;
    }

   if (data.result === 'success') {
      if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = '발송 완료'; }
      if (typeof showToast === 'function') showToast(recipientEmail + '에게 발송 완료!');
      else alert('발송 완료');

      if (typeof saveToPipeline === 'function') {
        var vars = (typeof buildVarsV2 === 'function') ? buildVarsV2() : buildVars();
        saveToPipeline(vars.name, vars.position, currentKey);
      }
    } else {
      alert('발송 실패: ' + (data.message || '알 수 없는 오류'));
    }
 } catch (err) {
    if (err.name === 'AbortError') {
      // 타임아웃 → 실제로는 발송됐을 가능성 높음
      if (typeof showToast === 'function') showToast('응답 시간이 초과되었습니다. 발송 여부를 받은편지함에서 확인해주세요.');
    } else {
      alert('발송 중 오류: ' + err.message);
    }
    if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = '바로 발송'; }
  }
}

// ============================================================
// [기능 2] 일정 추천
// ============================================================

async function suggestSchedule() {
  // ★ 시트 조회 필수 체크
  if (!syncedInterviewerNames || syncedInterviewerNames.length === 0) {
    alert('먼저 시트 연동에서 후보자 이메일로 시트 조회를 진행해주세요.\n면접관 정보가 필요합니다.');
    return;
  }

  var suggestStatus = document.getElementById('suggestStatus');
  var suggestResults = document.getElementById('suggestResults');

  if (suggestStatus) suggestStatus.textContent = syncedInterviewerNames.join(', ') + '의 캘린더 조회 중...';
  if (suggestResults) suggestResults.innerHTML = '';

  try {
    var syncUrl = (typeof GAS_SYNC_URL !== 'undefined' && GAS_SYNC_URL) ? GAS_SYNC_URL : '';
    if (!syncUrl) {
      if (suggestStatus) suggestStatus.textContent = 'GAS_SYNC_URL이 설정되지 않았습니다.';
      return;
    }

    var res = await fetch(syncUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'suggestSchedule',
        interviewerNames: syncedInterviewerNames
      }),
      redirect: 'follow'
    });

    var data = await res.json();

    if (data.result !== 'success') {
      if (suggestStatus) suggestStatus.textContent = data.message || '조회 실패';
      return;
    }

    if (!data.slots || data.slots.length === 0) {
      if (suggestStatus) suggestStatus.textContent = '2주 내 가능한 공통 시간대가 없습니다.';
      return;
    }

if (suggestStatus) {
      suggestStatus.textContent = '면접관: ' + (data.interviewers || []).join(', ');
    }

    if (suggestResults) {
      renderDateGroupedSlots(data.slots, suggestResults);
    }
    
  } catch (err) {
    if (suggestStatus) suggestStatus.textContent = '조회 중 오류: ' + err.message;
  }
}

  /** 선택된 슬롯 저장소 */
var selectedSlots = [];


function selectSuggestedSlot(date, time, chipIndex) {
  var key = date + ' ' + time;
  var chips = document.querySelectorAll('.suggest-chip');
  var chip = chips[chipIndex];

  // 이미 선택된 슬롯이면 → 토글 해제
  var existIdx = selectedSlots.findIndex(function(s) { return s.key === key; });
  if (existIdx !== -1) {
    selectedSlots.splice(existIdx, 1);
    if (chip) chip.classList.remove('selected');
    applySelectedSlots();
    return;
  }

  // 3개 초과 선택 방지
  if (selectedSlots.length >= 3) {
    alert('제안 일정은 최대 3개까지 선택할 수 있습니다.');
    return;
  }

  // 선택 추가
  selectedSlots.push({ key: key, date: date, time: time });
  if (chip) chip.classList.add('selected');

  applySelectedSlots();
}

/** 선택된 슬롯을 날짜순 정렬 → p1, p2, p3에 반영 */
function applySelectedSlots() {
  // 날짜+시간 오름차순 정렬
  selectedSlots.sort(function(a, b) {
    return (a.date + a.time).localeCompare(b.date + b.time);
  });

  var prefixes = ['p1', 'p2', 'p3'];

  // 3칸 모두 초기화
  for (var i = 0; i < prefixes.length; i++) {
    var dateInput = document.getElementById(prefixes[i] + '_date');
    var timeSelect = document.getElementById(prefixes[i] + '_time');
    if (dateInput) dateInput.value = '';
    if (timeSelect) timeSelect.value = '';
    if (typeof onDatePickerChange === 'function') onDatePickerChange(prefixes[i]);
  }

  // 정렬된 순서대로 채우기
  for (var j = 0; j < selectedSlots.length && j < 3; j++) {
    var dateInput = document.getElementById(prefixes[j] + '_date');
    var timeSelect = document.getElementById(prefixes[j] + '_time');
    if (dateInput) dateInput.value = selectedSlots[j].date;
    if (timeSelect) timeSelect.value = selectedSlots[j].time;
    if (typeof onDatePickerChange === 'function') onDatePickerChange(prefixes[j]);
  }
}

  // ============================================================
// 날짜별 그룹 렌더링 (A안: 날짜 칩 + 시간 드롭다운)
// ============================================================

function renderDateGroupedSlots(slots, container) {
  var dateMap = {};
  var dateOrder = [];
  slots.forEach(function(slot) {
    if (!dateMap[slot.date]) {
      dateMap[slot.date] = { weekday: slot.weekday, times: [] };
      dateOrder.push(slot.date);
    }
    dateMap[slot.date].times.push({
      time: slot.time, endTime: slot.endTime,
      display: slot.display, priority: slot.priority
    });
  });

  if (dateOrder.length === 0) { container.innerHTML = ''; return; }

  var html = '<div class="suggest-date-group">';
  dateOrder.forEach(function(date) {
    var group = dateMap[date];
    var shortDate = date.substring(5);
    var isSelected = selectedSlots.some(function(s) { return s.date === date; });

    html += '<div class="suggest-date-chip' + (isSelected ? ' has-selection' : '') + '" ' +
            'onclick="toggleDateDropdown(this, event)" data-date="' + date + '">' +
            shortDate + ' (' + group.weekday + ') ' +
            '<span class="slot-count">' + group.times.length + '건</span>' +
            '<span class="arrow">▼</span>' +
            '<div class="suggest-time-dropdown">';

    group.times.forEach(function(t) {
      var timeKey = date + ' ' + t.time;
      var isTimeSelected = selectedSlots.some(function(s) { return s.key === timeKey; });
      html += '<button type="button" class="suggest-time-option' +
              (isTimeSelected ? ' selected' : '') +
              (t.priority > 0 ? ' low-priority' : '') + '" ' +
              'onclick="selectTimeFromDropdown(\'' + date + '\',\'' + t.time + '\', this, event)">' +
              t.time + '~' + t.endTime + '</button>';
    });

    html += '</div></div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

function toggleDateDropdown(chip, event) {
  if (event.target.classList.contains('suggest-time-option')) return;
  var wasActive = chip.classList.contains('active');
  document.querySelectorAll('.suggest-date-chip.active').forEach(function(c) { c.classList.remove('active'); });
  if (!wasActive) chip.classList.add('active');
}

function selectTimeFromDropdown(date, time, btn, event) {
  event.stopPropagation();
  var key = date + ' ' + time;
  var existIdx = selectedSlots.findIndex(function(s) { return s.key === key; });

  if (existIdx !== -1) {
    selectedSlots.splice(existIdx, 1);
    btn.classList.remove('selected');
  } else {
    var sameDateIdx = selectedSlots.findIndex(function(s) { return s.date === date; });
    if (sameDateIdx !== -1) selectedSlots.splice(sameDateIdx, 1);
    if (selectedSlots.length >= 3) { alert('제안 일정은 최대 3개까지 선택할 수 있습니다.'); return; }
    selectedSlots.push({ key: key, date: date, time: time });
    btn.closest('.suggest-time-dropdown').querySelectorAll('.suggest-time-option').forEach(function(o) { o.classList.remove('selected'); });
    btn.classList.add('selected');
  }
  applySelectedSlots();
  updateDateChipStates();
}

function updateDateChipStates() {
  document.querySelectorAll('.suggest-date-chip').forEach(function(chip) {
    var date = chip.getAttribute('data-date');
    var isSelected = selectedSlots.some(function(s) { return s.date === date; });
    chip.classList.toggle('has-selection', isSelected);
  });
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.suggest-date-chip')) {
    document.querySelectorAll('.suggest-date-chip.active').forEach(function(c) { c.classList.remove('active'); });
  }
});

// ============================================================
// 과제 일정 자동 추천 (금, 토, 일 09:00)
// ============================================================

function suggestTaskSchedule() {
  var now = new Date();
  var currentDay = now.getDay();
  var daysUntilFri = (5 - currentDay + 7) % 7;
  if (daysUntilFri === 0 && now.getHours() >= 9) daysUntilFri = 7;

  var fri = new Date(now.getFullYear(), now.getMonth(), now.getDate() + daysUntilFri);
  var sat = new Date(fri.getTime() + 1 * 24 * 60 * 60 * 1000);
  var sun = new Date(fri.getTime() + 2 * 24 * 60 * 60 * 1000);

  var dates = [fri, sat, sun];
  var prefixes = ['p1', 'p2', 'p3'];
  selectedSlots = [];

  for (var i = 0; i < 3; i++) {
    var d = dates[i];
    var dateStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    var dateInput = document.getElementById(prefixes[i] + '_date');
    var timeSelect = document.getElementById(prefixes[i] + '_time');
    if (dateInput) dateInput.value = dateStr;
    if (timeSelect) timeSelect.value = '09:00';
    if (typeof onDatePickerChange === 'function') onDatePickerChange(prefixes[i]);
  }

  if (typeof showToast === 'function') showToast('이번 주 금/토/일 09:00으로 제안 일정을 설정했습니다.');
}


// ============================================================
// sendBtn 활성화 패치
// ============================================================

function patchSendButton() {
  var sendBtn = document.getElementById('sendBtn');
  if (!sendBtn) return;

  var origShowPreview = window.showPreview;
  if (origShowPreview) {
    window.showPreview = function(html) {
      origShowPreview(html);
      sendBtn.disabled = !html;
      if (html) { sendBtn.textContent = '바로 발송'; }
    };
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', patchSendButton);
} else {
  setTimeout(patchSendButton, 100);
}

async function loadPendingCandidates() {
  var area = document.getElementById('pendingArea');
  if (!area) return;

  var syncUrl = (typeof GAS_SYNC_URL !== 'undefined' && GAS_SYNC_URL) ? GAS_SYNC_URL : '';
  if (!syncUrl) return;

  // 로딩 상태 표시
  area.innerHTML = '<div class="pending-bar pending-loading">' +
    '<span class="pending-label">📌 일정 미확정 후보자 조회 중...</span>' +
    '</div>';

  try {
    var res = await fetch(syncUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'pendingCandidates' }),
      redirect: 'follow'
    });
    var data = await res.json();

    if (data.result !== 'success' || !data.candidates || data.candidates.length === 0) {
      area.innerHTML = '<div class="pending-bar pending-empty">' +
        '<span class="pending-label">✅ 일정 미확정 후보자가 없습니다</span>' +
        '</div>';
      return;
    }

    var html = '<div class="pending-bar">' +
      '<span class="pending-label">📌 일정 미확정 (' + data.candidates.length + ')</span>';

    pendingCandidatesCache = data.candidates;  // ★ 캐시 저장

    data.candidates.forEach(function(c, idx) {
      html += '<button type="button" class="pending-chip" ' +
        'onclick="selectPendingCandidate(' + idx + ')">' +
        escapeHtml(c.name) +
        ' <span class="pending-pos">' + escapeHtml(c.position) + '</span>' +
        ' <span class="pending-stage">' + escapeHtml(c.stage) + '</span>' +
        '</button>';
    });

    html += '</div>';
    area.innerHTML = html;

  } catch (err) {
    area.innerHTML = '<div class="pending-bar pending-empty">' +
      '<span class="pending-label">⚠️ 후보자 목록을 불러올 수 없습니다</span>' +
      '</div>';
  }
}

function selectPendingCandidate(idx) {
  var c = pendingCandidatesCache[idx];
  if (!c) return;

  // 필드 즉시 채우기
  if (nameEl) nameEl.value = c.name;
  if (positionEl) positionEl.value = c.position;
  var emailInput = document.getElementById('candidateEmail');
  if (emailInput) emailInput.value = c.email || '';

  // 면접관 정보 세팅 (일정 추천에 필요)
  syncedInterviewerNames = c.interviewerNames || [];

  // 상태 표시
  var syncStatus = document.getElementById('syncStatus');
  if (syncStatus) {
    var stageInfo = (typeof getStageInfo === 'function')
      ? getStageInfo(c.stage || '')
      : { icon: '📋', label: c.stage || '' };
    var interviewerText = syncedInterviewerNames.length > 0
      ? ' | 면접관: ' + syncedInterviewerNames.join(', ')
      : '';
    syncStatus.innerHTML =
      '<span class="sync-found">' +
        '✅ ' + escapeHtml(c.name) + ' | ' + escapeHtml(c.position) +
        ' | 현재 단계: <strong>' + stageInfo.icon + ' ' + stageInfo.label + '</strong>' +
        interviewerText +
      '</span>';
  }

  showToast(c.name + '님의 정보를 불러왔습니다.');
}

  
/**
 * 전체 초기화 — DOM이 준비된 후 실행
 */
function initUpgradeModule() {
  // 1. 날짜 피커 초기화
  initAllDatePickers();

  // 2. 기존 함수 패치
  patchBuildVars();
  patchSaveHistory();
  patchFinalNoticeButton();
  patchResetAllFields();

  // 3. 파이프라인 패널 렌더링
  renderPipelinePanel();
  // 4. 일정 미확정 후보자 로드
  loadPendingCandidates();

  console.log('[Upgrade Module] 고도화 모듈 v2.0 초기화 완료');
}

// DOM 로드 후 실행
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initUpgradeModule);
} else {
  // 이미 로드된 경우 (스크립트가 body 하단에 있을 때)
  setTimeout(initUpgradeModule, 0);
}
